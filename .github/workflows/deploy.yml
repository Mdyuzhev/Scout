name: Deploy Scout

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /opt/scout
          git fetch origin main
          git reset --hard origin/main

      - name: Build and start
        run: |
          cd /opt/scout
          docker compose up --build -d

      - name: Health check
        run: |
          sleep 15
          curl -sf http://localhost:8020/health || exit 1
          echo "✅ Scout MCP is up"

      - name: Smoke test
        run: |
          curl -sf http://localhost:8020/tools | \
            grep -q "scout_index" && echo "✅ MCP tools OK" || exit 1
