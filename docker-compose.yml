services:
  scout-postgres:
    image: postgres:16-alpine
    container_name: scout-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scout_db}
      POSTGRES_USER: ${POSTGRES_USER:-scout_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - scout_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scout_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scout-net

  scout-chroma:
    image: chromadb/chroma:latest
    container_name: scout-chroma
    ports:
      - "8000:8000"
    volumes:
      - scout_chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - scout-net

  scout-redis:
    image: redis:7-alpine
    container_name: scout-redis
    # Без ports — доступен только через scout-net (6380 на хосте занят homelab-redis)
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scout-net

  scout-mcp:
    build: .
    container_name: scout-mcp
    env_file: .env
    ports:
      - "8020:8020"
    environment:
      - MCP_NODE_NAME=node-8020
    depends_on:
      scout-postgres:
        condition: service_healthy
      scout-chroma:
        condition: service_healthy
      scout-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scout-net

  scout-mcp-2:
    build: .
    container_name: scout-mcp-2
    env_file: .env
    ports:
      - "8021:8020"
    environment:
      - MCP_NODE_NAME=node-8021
    depends_on:
      scout-postgres:
        condition: service_healthy
      scout-chroma:
        condition: service_healthy
      scout-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scout-net

  scout-mcp-3:
    build: .
    container_name: scout-mcp-3
    ports:
      - "8022:8020"
    env_file:
      - .env
    environment:
      - MCP_NODE_NAME=node-8022
    depends_on:
      scout-postgres:
        condition: service_healthy
      scout-chroma:
        condition: service_healthy
      scout-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - scout-net
    restart: unless-stopped

  diser-rag:
    image: scout-scout-mcp:latest
    container_name: diser-rag
    env_file: .env
    ports:
      - "8031:8031"
    environment:
      - SERVER_PORT=8031
      - DISER_RAG_URL=http://diser-rag:8031
    volumes:
      - diser_chroma_data:/app/data/diser_chroma
      - /opt/scout/diser_briefs:/opt/scout/diser_briefs:ro
      - ./src/diser_rag:/app/src/diser_rag:ro
    command: ["python", "src/diser_rag/server.py"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8031/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    restart: unless-stopped
    networks:
      - scout-net

volumes:
  scout_postgres_data:
  scout_chroma_data:
  diser_chroma_data:

networks:
  scout-net:
    driver: bridge
