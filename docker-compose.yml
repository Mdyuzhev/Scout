services:
  scout-postgres:
    image: postgres:16-alpine
    container_name: scout-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scout_db}
      POSTGRES_USER: ${POSTGRES_USER:-scout_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - scout_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scout_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scout-net

  scout-chroma:
    image: chromadb/chroma:latest
    container_name: scout-chroma
    ports:
      - "8000:8000"
    volumes:
      - scout_chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - scout-net

  scout-mcp:
    build: .
    container_name: scout-mcp
    env_file: .env
    ports:
      - "8020:8020"
    depends_on:
      scout-postgres:
        condition: service_healthy
      scout-chroma:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scout-net

  scout-mcp-2:
    build: .
    container_name: scout-mcp-2
    env_file: .env
    ports:
      - "8021:8020"
    depends_on:
      scout-postgres:
        condition: service_healthy
      scout-chroma:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scout-net

volumes:
  scout_postgres_data:
  scout_chroma_data:

networks:
  scout-net:
    driver: bridge
